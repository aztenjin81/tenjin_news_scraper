name: Deploy

# Self-hosted runner on the OCI box. The runner has docker access and
# the working tree at /opt/tenjin — see infra/DEPLOY.md.
#
# Safety: this workflow triggers on `push` to main only. Forked PRs
# cannot run it. Always review PR diffs (especially anything touching
# .github/workflows/*) before merging.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "services/api/**"
      - "infra/docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, oci]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and roll forward
        run: |
          set -euo pipefail
          docker compose -f infra/docker-compose.prod.yml build
          docker compose -f infra/docker-compose.prod.yml up -d --remove-orphans
          docker image prune -f

      - name: Show service status
        if: always()
        run: |
          docker compose -f infra/docker-compose.prod.yml ps
          echo "---- migrate logs ----"
          docker compose -f infra/docker-compose.prod.yml logs --no-color migrate || true
          echo "---- api logs ----"
          docker compose -f infra/docker-compose.prod.yml logs --no-color --tail=80 api || true
          echo "---- scheduler logs ----"
          docker compose -f infra/docker-compose.prod.yml logs --no-color --tail=40 scheduler || true
          echo "---- web logs ----"
          docker compose -f infra/docker-compose.prod.yml logs --no-color --tail=40 web || true

      - name: Wait for health
        run: |
          set -euo pipefail
          ok=0
          for i in $(seq 1 30); do
            api_ok=$(curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health 2>/dev/null || echo "0")
            web_ok=$(curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ 2>/dev/null || echo "0")
            if [[ "$api_ok" == "200" && "$web_ok" == "200" ]]; then
              echo "api + web are healthy"
              ok=1
              break
            fi
            echo "waiting (api=$api_ok web=$web_ok) attempt $i/30"
            sleep 3
          done
          if [[ "$ok" -ne 1 ]]; then
            echo "stack did not become healthy in time"
            docker compose -f infra/docker-compose.prod.yml ps
            docker compose -f infra/docker-compose.prod.yml logs --tail=80
            exit 1
          fi
