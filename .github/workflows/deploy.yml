name: Deploy web

# Self-hosted runner on the OCI box. The runner has docker access and
# the working tree at /opt/tenjin — see infra/DEPLOY.md.
#
# Safety: this workflow triggers on `push` to main only. Forked PRs
# cannot run it. Always review PR diffs (especially anything touching
# .github/workflows/*) before merging.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "infra/docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, oci]
    steps:
      - uses: actions/checkout@v4

      - name: Build and roll forward
        run: |
          set -euo pipefail
          docker compose -f infra/docker-compose.prod.yml up -d --build
          docker image prune -f

      - name: Wait for health
        run: |
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null http://127.0.0.1:3000/; then
              echo "web is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "web did not become healthy in time"
          docker compose -f infra/docker-compose.prod.yml logs --tail=80 web
          exit 1
