services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tenjin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tenjin}
      POSTGRES_DB: ${POSTGRES_DB:-tenjin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tenjin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    image: tenjin-api:local
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tenjin}:${POSTGRES_PASSWORD:-tenjin}@postgres:5432/${POSTGRES_DB:-tenjin}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: tenjin-api:local
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tenjin}:${POSTGRES_PASSWORD:-tenjin}@postgres:5432/${POSTGRES_DB:-tenjin}
      REDIS_URL: redis://redis:6379/0
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}
    ports:
      # Loopback only — cloudflared on the host reaches us via 127.0.0.1.
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  scheduler:
    image: tenjin-api:local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tenjin}:${POSTGRES_PASSWORD:-tenjin}@postgres:5432/${POSTGRES_DB:-tenjin}
      REDIS_URL: redis://redis:6379/0
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS:-300}
    command: ["python", "-m", "tenjin.workers.scheduler"]
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: tenjin-web:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Server-side fetches (SSR) reach the api container directly.
      API_BASE_URL: http://api:8000
      # Browser-side fetches use whatever the operator routes publicly.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
